<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — BotHost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>⚡ BotHost</h1>
      <p>Bot Hosting Platform</p>
    </div>

    <h2>Create account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div class="alert alert-info" style="font-size:12px">
      ⚡ Free tier includes <strong>1 server slot</strong> — created automatically on registration.
    </div>

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="myusername" required autocomplete="username" minlength="3" maxlength="32">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create account & get server →</button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center; font-size:13px; color:var(--text-muted)">
      Have an account? <a href="{{ url_for('login') }}">Sign in →</a>
    </p>
  </div>
</div>
</body>
</html>
