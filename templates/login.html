<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — BotHost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>⚡ BotHost</h1>
      <p>Bot Hosting Platform</p>
    </div>

    <h2>Sign in</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer;font-weight:400">
          <input type="checkbox" name="remember" value="1"
                 style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
          Keep me signed in
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign in →</button>
    </form>

    <div class="divider"></div>
    <p style="text-align:center; font-size:13px; color:var(--text-muted)">
      No account? <a href="{{ url_for('register') }}">Create one free →</a>
    </p>
  </div>
</div>
</body>
</html>
